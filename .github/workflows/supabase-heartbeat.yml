name: Supabase heartbeat

on:
  schedule:
    # Every 3 days at 06:00 UTC — under the 7-day free-tier pause window
    - cron: '0 6 */3 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Auth health
        run: |
          curl -sf "${{ secrets.SUPABASE_URL }}/auth/v1/health" \
            -H "apikey: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}"

      - name: Ping database heartbeat RPC
        run: |
          curl -sf -X POST "${{ secrets.SUPABASE_URL }}/rest/v1/rpc/heartbeat" \
            -H "apikey: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}'
